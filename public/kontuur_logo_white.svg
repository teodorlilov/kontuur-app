      <rect x="156.12" y="198.31" width="367.77" height="21" fill="black" rx="2"/>
      <rect x="260.55" y="288.08" width="158.81" height="16.3" fill="black" rx="2"/>
    </mask>
  </defs>
  <!-- Horizontal rules -->
  <line x1="80" y1="80" x2="600" y2="80" stroke="#ECE8E1" stroke-width="0.6" opacity="0.25"/>
