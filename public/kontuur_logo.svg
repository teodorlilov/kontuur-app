      <rect x="123.53" y="86.11" width="432.93" height="90.42" fill="black" rx="2"/>
      <rect x="156.12" y="190.31" width="367.76" height="21" fill="black" rx="2"/>
    </mask>
  </defs>
  <!-- Horizontal rules -->
  <line x1="80" y1="72" x2="600" y2="72" stroke="#1A2630" stroke-width="0.6" opacity="0.25"/>
